[build]
builder = "RAILPACK"

[deploy]
startCommand = "sh -c 'if [ \"$START_COMMAND\" = \"celery\" ]; then apt-get install -y ffmpeg -q && celery -A sabrlingua worker --loglevel=info --pool=solo; else gunicorn sabrlingua.wsgi --log-file - --timeout 300 --workers 4; fi'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = ["ffmpeg"]